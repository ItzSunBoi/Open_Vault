<!DOCTYPE html>
<html lang="en">
<head>
<script src="/http-socket.js"></script>
<script src="/multiplayer-common.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drawing Party — GameVault</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  header{padding:12px 20px;border-bottom:1px solid rgba(123,47,255,0.2);display:flex;align-items:center;gap:14px;flex-shrink:0;}
  .back{color:rgba(123,47,255,0.7);text-decoration:none;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',monospace;}
  header h1{font-family:'Orbitron',monospace;font-size:18px;color:#a07bff;letter-spacing:2px;}
  .room-badge{margin-left:auto;font-family:'Orbitron',monospace;font-size:13px;color:#7b2fff;}
  .game-area{display:flex;flex:1;gap:0;overflow:hidden;}
  .left-panel{width:220px;flex-shrink:0;border-right:1px solid rgba(123,47,255,0.15);display:flex;flex-direction:column;padding:12px;gap:10px;overflow-y:auto;}
  .center{flex:1;display:flex;flex-direction:column;}
  .word-bar{padding:10px 16px;background:#0d1426;border-bottom:1px solid rgba(123,47,255,0.15);display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .word-display{font-family:'Orbitron',monospace;font-size:20px;letter-spacing:8px;color:#a07bff;flex:1;text-align:center;}
  .timer{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:#ff2255;min-width:40px;text-align:right;}
  #canvas{display:block;width:100%;flex:1;cursor:crosshair;touch-action:none;}
  .toolbar{padding:10px 16px;border-top:1px solid rgba(123,47,255,0.15);display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;}
  .colors{display:flex;gap:6px;flex-wrap:wrap;}
  .color-btn{width:26px;height:26px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .1s;}
  .color-btn.active{border-color:#fff;transform:scale(1.2);}
  .size-btns{display:flex;gap:6px;}
  .size-btn{background:#333;border:none;border-radius:6px;padding:5px 10px;color:#e0f0ff;cursor:pointer;font-size:13px;}
  .size-btn.active{background:#7b2fff;}
  .tool-btn{background:#333;border:none;border-radius:6px;padding:6px 12px;color:#e0f0ff;cursor:pointer;font-size:12px;font-family:'Orbitron',monospace;letter-spacing:1px;transition:background .15s;}
  .tool-btn:hover{background:#555;} .tool-btn.danger{background:#5d0022;}
  .right-panel{width:240px;flex-shrink:0;border-left:1px solid rgba(123,47,255,0.15);display:flex;flex-direction:column;}
  .chat-msgs{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
  .chat-msgs::-webkit-scrollbar{width:4px;} .chat-msgs::-webkit-scrollbar-thumb{background:rgba(123,47,255,0.3);}
  .chat-input-wrap{padding:10px;border-top:1px solid rgba(123,47,255,0.15);display:flex;gap:8px;}
  .chat-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(123,47,255,0.2);color:#e0f0ff;padding:8px 12px;border-radius:6px;font-size:14px;font-family:'Rajdhani',sans-serif;outline:none;}
  .chat-input:focus{border-color:#7b2fff;}
  .send-btn{background:#7b2fff;border:none;color:#fff;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;}
  .msg{font-size:13px;line-height:1.4;}
  .msg .name{color:#a07bff;font-weight:700;}
  .msg.correct .name,.msg.correct .text{color:#00ffaa;}
  .msg.system{color:rgba(224,240,255,0.4);font-style:italic;}
  .player-list{display:flex;flex-direction:column;gap:6px;}
  .player-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:14px;}
  .player-item.drawing{background:rgba(123,47,255,0.15);border:1px solid rgba(123,47,255,0.3);}
  .player-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}
  .player-score{margin-left:auto;font-family:'Orbitron',monospace;font-size:12px;color:#a07bff;}
  .panel-title{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(224,240,255,0.3);margin-bottom:6px;}
  .round-info{font-size:13px;color:rgba(224,240,255,0.5);text-align:center;}
  .overlay{position:absolute;inset:0;background:rgba(5,7,15,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:10;}
  .overlay h2{font-family:'Orbitron',monospace;font-size:24px;color:#a07bff;}
  .btn{background:#7b2fff;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s;}
  .btn:hover{opacity:.85}
  @media(max-width:700px){.left-panel,.right-panel{display:none;} .word-bar{justify-content:center;}}

  .ping-badge{font-family:'Orbitron',monospace;font-size:11px;color:rgba(224,240,255,0.55);border:1px solid rgba(255,255,255,0.12);padding:4px 8px;border-radius:999px;}
  .ping-badge[data-quality="good"]{color:#00ffaa;border-color:rgba(0,255,170,0.28);}
  .ping-badge[data-quality="ok"]{color:#ffcc00;border-color:rgba(255,204,0,0.28);}
  .ping-badge[data-quality="poor"]{color:#ff6677;border-color:rgba(255,102,119,0.28);}
</style>
</head>
<body>
<header>
  <a class="back" href="/games">← Back</a>
  <h1>🎨 Drawing Party</h1>
  <div class="room-badge" id="room-badge">Room: ---</div>
  <div class="ping-badge" id="ping-badge">Ping -- ms</div>
</header>
<div class="game-area">
  <div class="left-panel">
    <div class="panel-title">Players</div>
    <div class="player-list" id="player-list"></div>
    <div style="margin-top:auto;">
      <div class="round-info" id="round-info">Waiting for players...</div>
    </div>
  </div>
  <div class="center" style="position:relative;">
    <div class="word-bar">
      <div class="word-display" id="word-display">_ _ _ _ _</div>
      <div class="timer" id="timer">60</div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="toolbar" id="toolbar">
      <div class="colors" id="colors"></div>
      <div class="size-btns">
        <button class="size-btn active" data-size="4">S</button>
        <button class="size-btn" data-size="10">M</button>
        <button class="size-btn" data-size="20">L</button>
        <button class="size-btn" data-size="36">XL</button>
      </div>
      <button class="tool-btn" id="eraser-btn" onclick="toggleEraser()">Eraser</button>
      <button class="tool-btn danger" onclick="clearCanvas()">Clear</button>
    </div>
    <div class="overlay" id="overlay">
      <h2>Drawing Party</h2>
      <p style="color:rgba(224,240,255,0.6)">Connecting to room...</p>
    </div>
  </div>
  <div class="right-panel">
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-wrap">
      <input class="chat-input" id="chat-input" placeholder="Type guess..." autocomplete="off">
      <button class="send-btn" onclick="sendGuess()">→</button>
    </div>
  </div>
</div>

<script>
const { roomId, playerName } = GameVaultMP.normalizeMultiplayerParams({ defaultName: 'Player' });
document.getElementById('room-badge').textContent = 'Room: ' + roomId;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let drawing = false, isDrawer = false, color = '#ffffff', brushSize = 4, erasing = false;
let ws, timerInterval;

// Setup canvas size
function resizeCanvas() {
  const wrap = canvas.parentElement;
  const toolbar = document.getElementById('toolbar');
  const wordBar = document.querySelector('.word-bar');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight - toolbar.offsetHeight - wordBar.offsetHeight;
  canvas.width = w; canvas.height = Math.max(200, h);
}
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

// Colors
const PALETTE = ['#ffffff','#000000','#ff2255','#ff8800','#ffcc00','#00cc44','#00aaff','#7b2fff','#ff44aa','#884400','#aaaaaa','#334455'];
const colDiv = document.getElementById('colors');
PALETTE.forEach(c => {
  const btn = document.createElement('div');
  btn.className = 'color-btn' + (c === '#ffffff' ? ' active' : '');
  btn.style.background = c;
  btn.style.borderColor = c === '#ffffff' ? '#fff' : 'transparent';
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    color = c; erasing = false;
    document.getElementById('eraser-btn').style.background = '';
  });
  colDiv.appendChild(btn);
});

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    brushSize = parseInt(btn.dataset.size);
  });
});

function toggleEraser() {
  erasing = !erasing;
  document.getElementById('eraser-btn').style.background = erasing ? '#7b2fff' : '';
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ws && ws.send(JSON.stringify({ type: 'draw_clear', room: roomId }));
}

// Drawing
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

function startDraw(e) {
  if (!isDrawer) return;
  drawing = true;
  const p = getPos(e);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  ws && ws.send(JSON.stringify({ type: 'draw', room: roomId, action: 'start', x: p.x/canvas.width, y: p.y/canvas.height, color: erasing ? '#1a1a2e' : color, size: erasing ? brushSize*2 : brushSize }));
}

function doDraw(e) {
  if (!drawing || !isDrawer) return;
  e.preventDefault();
  const p = getPos(e);
  drawLine(p.x, p.y, erasing ? '#1a1a2e' : color, erasing ? brushSize*2 : brushSize);
  ws && ws.send(JSON.stringify({ type: 'draw', room: roomId, action: 'move', x: p.x/canvas.width, y: p.y/canvas.height, color: erasing ? '#1a1a2e' : color, size: erasing ? brushSize*2 : brushSize }));
}

function endDraw() { drawing = false; ctx.beginPath(); }

function drawLine(x, y, c, s) {
  ctx.lineWidth = s; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = c; ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', doDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); doDraw(e); }, { passive: false });
canvas.addEventListener('touchend', endDraw);

// Init canvas bg
function initCanvas() {
  ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
}
setTimeout(initCanvas, 150);

// Chat
function addMsg(name, text, type = '') {
  const msgs = document.getElementById('chat-msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = name ? `<span class="name">${name}:</span> <span class="text">${text}</span>` : `<span class="text">${text}</span>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendGuess() {
  const inp = document.getElementById('chat-input');
  const word = inp.value.trim();
  if (!word) return;
  ws && ws.send(JSON.stringify({ type: 'guess', room: roomId, word }));
  if (isDrawer) { addMsg(playerName, word); }
  inp.value = '';
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendGuess();
});

// Players
function renderPlayers(players) {
  const colors = ['#ff2255','#00aaff','#ffcc00','#00ffaa','#ff8800','#7b2fff'];
  document.getElementById('player-list').innerHTML = players.map((p, i) => `
    <div class="player-item ${p.drawing ? 'drawing' : ''}">
      <div class="player-avatar" style="background:${colors[i%colors.length]}33;color:${colors[i%colors.length]}">${p.name[0].toUpperCase()}</div>
      <span>${p.name}${p.drawing ? ' 🎨' : ''}</span>
      <span class="player-score">${p.score||0}</span>
    </div>`).join('');
}

// WebSocket
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  GameVaultMP.bindPingDisplay(ws, 'ping-badge');
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room: roomId, name: playerName, game: 'drawing' }));
  };
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'joined') {
      addMsg('', `Welcome, ${playerName}! Room: ${roomId}`, 'system');
      renderPlayers(d.players || []);
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay').innerHTML = `
        <h2>Drawing Party</h2>
        <p style="color:rgba(224,240,255,0.6)">Room ${roomId} — waiting for players...</p>
        ${d.isHost ? `<button class="btn" onclick="ws.send(JSON.stringify({type:'start_game',room:'${roomId}'}))">Start Game</button>` : ''}
      `;
    }
    if (d.type === 'player_joined') { addMsg('', `${d.name} joined`, 'system'); renderPlayers(d.players); }
    if (d.type === 'player_left') { addMsg('', `${d.name} left`, 'system'); renderPlayers(d.players); }
    if (d.type === 'round_start') {
      isDrawer = d.drawer === playerName;
      document.getElementById('round-info').textContent = `Round ${d.round} of ${d.totalRounds}`;
      document.getElementById('overlay').style.display = 'none';
      if (isDrawer) {
        document.getElementById('word-display').textContent = d.word;
        addMsg('', `You are drawing: ${d.word}`, 'system');
        document.getElementById('toolbar').style.display = 'flex';
        document.getElementById('chat-input').placeholder = 'Others are guessing...';
        document.getElementById('chat-input').disabled = true;
      } else {
        document.getElementById('word-display').textContent = d.hint;
        addMsg('', `${d.drawer} is drawing!`, 'system');
        document.getElementById('toolbar').style.display = 'none';
        document.getElementById('chat-input').placeholder = 'Type guess...';
        document.getElementById('chat-input').disabled = false;
      }
      initCanvas(); startTimer(d.timeLeft || 60);
      renderPlayers(d.players);
    }
    if (d.type === 'draw') {
      if (d.action === 'start') { ctx.beginPath(); ctx.moveTo(d.x * canvas.width, d.y * canvas.height); }
      else if (d.action === 'move') { drawLine(d.x * canvas.width, d.y * canvas.height, d.color, d.size); }
    }
    if (d.type === 'draw_clear') { initCanvas(); }
    if (d.type === 'guess_msg') { addMsg(d.name, d.word, d.correct ? 'correct' : ''); }
    if (d.type === 'round_end') {
      clearInterval(timerInterval);
      document.getElementById('chat-input').disabled = true;
      document.getElementById('chat-input').placeholder = 'Next round starting...';
      addMsg('', `Round over! The word was: ${d.word}`, 'system');
      renderPlayers(d.players);
    }
    if (d.type === 'game_over') {
      addMsg('', `Game over! Winner: ${d.winner}`, 'system');
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay').innerHTML = `
        <h2>Game Over!</h2>
        <p style="color:rgba(224,240,255,0.6)">Winner: ${d.winner}</p>
        <button class="btn" onclick="document.getElementById('overlay').style.display='none';ws.send(JSON.stringify({type:'start_game',room:'${roomId}'}))">Play Again</button>
      `;
    }
    if (d.type === 'waiting') {
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay').innerHTML = `
        <h2>Drawing Party</h2>
        <p style="color:rgba(224,240,255,0.6)">${d.message || 'Waiting for more players...'}</p>
        ${d.canStart ? `<button class="btn" onclick="ws.send(JSON.stringify({type:'start_game',room:'${roomId}'}))">Start Game</button>` : ''}
      `;
    }
    if (d.type === 'timer') { document.getElementById('timer').textContent = d.value; }
  };
  ws.onclose = () => setTimeout(connect, 3000);
}

function startTimer(secs) {
  clearInterval(timerInterval);
  let t = secs;
  document.getElementById('timer').textContent = t;
  timerInterval = setInterval(() => {
    t--;
    document.getElementById('timer').textContent = Math.max(0, t);
    document.getElementById('timer').style.color = t <= 10 ? '#ff2255' : '#ff8800';
    if (t <= 0) clearInterval(timerInterval);
  }, 1000);
}

connect();
</script>
</body>
</html>
