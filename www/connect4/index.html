<!doctype html><html><head><script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script><meta charset="utf-8"><title>Vault Connect 4</title><style>body{background:#05070f;color:#e0f0ff;font-family:Rajdhani,sans-serif;padding:20px}.btn{background:#00ffaa;border:0;padding:8px 12px;border-radius:8px}.grid{display:grid;grid-template-columns:repeat(7,48px);gap:6px;margin-top:16px}.cell{width:48px;height:48px;border-radius:50%;background:#111a2f;display:flex;align-items:center;justify-content:center;font-weight:700}.R{background:#ff4a5f}.Y{background:#ffd54a}</style></head><body>
<a href="/vault">← Back</a><h2>Vault Connect 4</h2><div id="status">Connecting...</div><button class="btn" id="start">Start</button><div id="drops"></div><div class="grid" id="g"></div>
<script>
const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});let ws,state={board:Array.from({length:6},()=>Array(7).fill(null))};
function draw(){const g=document.getElementById('g');g.innerHTML='';state.board.forEach(r=>r.forEach(c=>{const d=document.createElement('div');d.className='cell '+(c||'');g.appendChild(d);}));const ds=document.getElementById('drops');ds.innerHTML='';for(let c=0;c<7;c++){const b=document.createElement('button');b.textContent='↓';b.className='btn';b.onclick=()=>ws.send(JSON.stringify({type:'c4_drop',col:c}));ds.appendChild(b);}document.getElementById('status').textContent=state.winner?`Winner: ${state.winner}`:state.draw?'Draw':`Turn: ${state.turn||'-'}`;}
ws=GameVaultMP.createSocket();ws.onopen=()=>ws.send(JSON.stringify({type:'join',game:'connect4',room:roomId,name:playerName}));ws.onmessage=(e)=>{const m=JSON.parse(e.data);if(m.type==='c4_state'||m.type==='c4_start'){state=m.state;draw();} if(m.type==='joined'){document.getElementById('status').textContent='Joined '+roomId;}};
document.getElementById('start').onclick=()=>ws.send(JSON.stringify({type:'start_game'}));
</script></body></html>
