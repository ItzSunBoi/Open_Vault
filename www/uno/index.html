<!doctype html><html><head><script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script><meta charset="utf-8"><title>Vault UNO</title><style>body{background:#05070f;color:#e0f0ff;font-family:Rajdhani,sans-serif;padding:20px}.btn{background:#7b2fff;color:#fff;border:0;padding:8px 12px;border-radius:8px;margin:3px}.hand{display:flex;flex-wrap:wrap;gap:6px}</style></head><body><a href="/vault">← Back</a><h2>Vault UNO</h2><div id="s"></div><button class="btn" id="start">Start</button><button class="btn" id="draw">Draw</button><h4>Top: <span id="top">-</span></h4><div class="hand" id="hand"></div>
<script>
const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});let ws;
function render(st){document.getElementById('s').textContent=`Turn: ${st.turn||'-'}`;document.getElementById('top').textContent=st.topCard||'-';const h=document.getElementById('hand');h.innerHTML='';(st.hand||[]).forEach(card=>{const b=document.createElement('button');b.className='btn';b.textContent=card;b.onclick=()=>ws.send(JSON.stringify({type:'uno_play',card}));h.appendChild(b);});}
ws=GameVaultMP.createSocket();ws.onopen=()=>ws.send(JSON.stringify({type:'join',game:'uno',room:roomId,name:playerName}));ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='uno_state')render(m);if(m.type==='uno_over')document.getElementById('s').textContent='Winner: '+m.winner;};
document.getElementById('start').onclick=()=>ws.send(JSON.stringify({type:'start_game'}));document.getElementById('draw').onclick=()=>ws.send(JSON.stringify({type:'uno_draw'}));
</script></body></html>
