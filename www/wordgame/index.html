<!DOCTYPE html>
<html lang="en">
<head>
<script src="/http-socket.js"></script>
<script src="/multiplayer-common.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vault Lex — Vault Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
  header{width:100%;padding:14px 24px;border-bottom:1px solid rgba(0,136,255,0.2);display:flex;align-items:center;gap:14px;}
  .back{color:rgba(0,136,255,0.7);text-decoration:none;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-family:'Orbitron',monospace;}
  header h1{font-family:'Orbitron',monospace;font-size:18px;color:#0088ff;letter-spacing:2px;}
  .room-badge{margin-left:auto;font-family:'Orbitron',monospace;font-size:13px;color:#0088ff;}
  .main{width:100%;max-width:700px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px;}
  .bomb-area{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px;}
  .bomb{font-size:72px;line-height:1;transition:transform .1s;position:relative;}
  .bomb.shake{animation:shake .3s;}
  @keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
  .syllable{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#0088ff;letter-spacing:6px;text-shadow:0 0 20px rgba(0,136,255,0.5);}
  .fuse{width:6px;height:60px;background:linear-gradient(to bottom, #ffaa00, #ff4400);border-radius:3px;transition:height 0.3s;}
  .players-ring{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;width:100%;}
  .player-card{background:#0d1426;border:2px solid rgba(0,136,255,0.15);border-radius:12px;padding:14px 18px;text-align:center;min-width:110px;transition:all .2s;}
  .player-card.active{border-color:#0088ff;box-shadow:0 0 20px rgba(0,136,255,0.3);background:#0a1830;}
  .player-card.eliminated{opacity:0.4;border-color:rgba(255,34,85,0.3);}
  .player-name{font-weight:700;font-size:15px;margin-bottom:4px;}
  .player-lives{font-size:20px;letter-spacing:2px;}
  .player-score{font-family:'Orbitron',monospace;font-size:12px;color:rgba(0,136,255,0.7);margin-top:4px;}
  .input-area{width:100%;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .word-input{width:100%;max-width:400px;background:rgba(0,136,255,0.05);border:2px solid rgba(0,136,255,0.25);color:#e0f0ff;padding:14px 20px;border-radius:10px;font-size:20px;font-family:'Rajdhani',sans-serif;outline:none;text-align:center;letter-spacing:2px;text-transform:uppercase;transition:border-color .2s;}
  .word-input:focus{border-color:#0088ff;}
  .word-input.correct{border-color:#00ffaa;background:rgba(0,255,170,0.05);}
  .word-input.wrong{border-color:#ff2255;background:rgba(255,34,85,0.05);animation:wshake .3s;}
  @keyframes wshake{0%,100%{transform:none}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .timer-bar{width:100%;max-width:400px;height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;}
  .timer-fill{height:100%;background:linear-gradient(90deg,#0088ff,#00ffaa);border-radius:3px;transition:width .1s linear;width:100%;}
  .log{width:100%;max-width:400px;background:#0d1426;border:1px solid rgba(0,136,255,0.1);border-radius:10px;padding:12px;max-height:150px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
  .log::-webkit-scrollbar{width:4px;} .log::-webkit-scrollbar-thumb{background:rgba(0,136,255,0.3);}
  .log-entry{font-size:13px;color:rgba(224,240,255,0.6);}
  .log-entry.success{color:#00ffaa;} .log-entry.fail{color:#ff2255;} .log-entry.sys{color:rgba(224,240,255,0.35);}
  .overlay{position:fixed;inset:0;background:rgba(5,7,15,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:50;}
  .overlay h2{font-family:'Orbitron',monospace;font-size:28px;color:#0088ff;letter-spacing:3px;}
  .overlay p{color:rgba(224,240,255,0.6);font-size:16px;}
  .room-code{font-family:'Orbitron',monospace;font-size:18px;color:#00ffaa;letter-spacing:3px;padding:10px 14px;border:1px solid rgba(0,255,170,0.25);border-radius:10px;background:rgba(0,255,170,0.06);}
  .btn{background:#0088ff;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s;}
  .btn:hover{opacity:.85}

  .ping-badge{font-family:'Orbitron',monospace;font-size:11px;color:rgba(224,240,255,0.55);border:1px solid rgba(255,255,255,0.12);padding:4px 8px;border-radius:999px;}
  .ping-badge[data-quality="good"]{color:#00ffaa;border-color:rgba(0,255,170,0.28);}
  .ping-badge[data-quality="ok"]{color:#ffcc00;border-color:rgba(255,204,0,0.28);}
  .ping-badge[data-quality="poor"]{color:#ff6677;border-color:rgba(255,102,119,0.28);}

  .ledger-panel{position:fixed;right:10px;bottom:10px;width:220px;max-height:260px;overflow:auto;background:rgba(5,7,15,0.92);border:1px solid rgba(0,255,170,0.15);border-radius:12px;padding:10px;z-index:40;backdrop-filter:blur(4px);} 
  .ledger-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:#00ffaa;margin-bottom:8px;text-transform:uppercase;}
  .ledger-row{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:rgba(224,240,255,0.82);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);} 
  .ledger-row:last-child{border-bottom:none;} .ledger-rank{color:#00ffaa;font-family:'Orbitron',monospace;width:20px;} .ledger-empty{font-size:12px;color:rgba(224,240,255,0.45);} 

</style>
</head>
<body>
<header>
  <a class="back" href="/vault">← Back</a>
  <h1>◇ Vault Lex</h1>
  <div class="room-badge" id="room-badge">Room: ---</div>
  <div class="ping-badge" id="ping-badge">Ping -- ms</div>
</header>
<div class="main">
  <div class="players-ring" id="players-ring"></div>
  <div class="bomb-area">
    <div class="fuse" id="fuse"></div>
    <div class="bomb" id="bomb">💣</div>
    <div class="syllable" id="syllable">_ _ _</div>
  </div>
  <div class="input-area">
    <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    <input class="word-input" id="word-input" placeholder="Type a word..." autocomplete="off" autocorrect="off" spellcheck="false" disabled>
  </div>
  <div class="log" id="log"></div>
</div>

<div class="overlay" id="overlay">
  <h2>◇ Vault Lex</h2>
  <div class="room-code" id="room-code">ROOM ---</div>
  <p id="overlay-msg">Connecting...</p>
  <button class="btn" id="start-btn" style="display:none" onclick="beginSequence()">Begin Sequence</button>
  <button class="btn" type="button" onclick="copyRoomLink()">Copy Room Link</button>
</div>

<script>
const LEDGER_GAME = 'Word Bomb';
const { roomId, playerName } = GameVaultMP.normalizeMultiplayerParams({ defaultName: 'Player' });
document.getElementById('room-badge').textContent = 'Room: ' + roomId;
document.getElementById('room-code').textContent = 'ROOM ' + roomId;

let ws, isMyTurn = false, timerFillInterval, isHost = false;

function addLog(text, type='') {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function renderPlayers(players) {
  document.getElementById('players-ring').innerHTML = players.map(p => `
    <div class="player-card ${p.active ? 'active' : ''} ${p.eliminated ? 'eliminated' : ''}">
      <div class="player-name">${p.name}${p.isMe ? ' (you)' : ''}</div>
      <div class="player-lives">${'❤️'.repeat(Math.max(0,p.lives))}${'🖤'.repeat(Math.max(0,3-p.lives))}</div>
      <div class="player-score">${p.score || 0} pts</div>
    </div>
  `).join('');
}

function setSyllable(s) {
  document.getElementById('syllable').textContent = s;
}

function startTimer(secs) {
  clearInterval(timerFillInterval);
  const fill = document.getElementById('timer-fill');
  const start = Date.now();
  const total = secs * 1000;
  timerFillInterval = setInterval(() => {
    const elapsed = Date.now() - start;
    const pct = Math.max(0, 100 - (elapsed / total * 100));
    fill.style.width = pct + '%';
    fill.style.background = pct > 50 ? 'linear-gradient(90deg,#0088ff,#00ffaa)' : pct > 25 ? 'linear-gradient(90deg,#ff8800,#ffcc00)' : 'linear-gradient(90deg,#ff2255,#ff8800)';
    if (pct <= 0) clearInterval(timerFillInterval);
  }, 50);
}

function beginSequence() {
  ws && ws.send(JSON.stringify({ type: 'start_game', room: roomId }));
}

function copyRoomLink() {
  const url = `${location.origin}/vault-lex/?room=${encodeURIComponent(roomId)}`;
  navigator.clipboard.writeText(url).then(() => addLog('Room link copied', 'sys')).catch(() => alert(url));
}

const wordInput = document.getElementById('word-input');
wordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && isMyTurn) {
    const word = wordInput.value.trim().toUpperCase();
    if (word.length < 2) return;
    ws && ws.send(JSON.stringify({ type: 'word', room: roomId, word }));
    wordInput.value = '';
  }
});


function renderLedger(scores) {
  scores = (scores || []).filter(s => s && s.game === LEDGER_GAME);
  const el = document.getElementById('ledger-list');
  if (!el) return;
  if (!scores || !scores.length) { el.innerHTML = '<div class="ledger-empty">No ledger entries yet.</div>'; return; }
  el.innerHTML = scores.slice(0,10).map((s,i)=>`<div class="ledger-row"><span class="ledger-rank">${i+1}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span><span>${s.score}</span></div>`).join('');
}
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  GameVaultMP.bindPingDisplay(ws, 'ping-badge');
  ws.onopen = () => ws.send(JSON.stringify({ type: 'join', room: roomId, name: playerName, game: 'wordgame' })); ws.send(JSON.stringify({ type: 'get_stats' }));
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'leaderboard') { renderLedger(d.scores); return; }
    if (d.type === 'join_error') {
      alert(d.error || 'Unable to join this room.');
      return;
    }
    if (d.type === 'joined') {
      isHost = !!d.isHost;
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay-msg').textContent = `Room ${roomId} — ${d.players.length} player(s). Need 2 to start.`;
      document.getElementById('start-btn').style.display = isHost ? 'block' : 'none';
      renderPlayers(d.players.map(p => ({...p, isMe: p.name === playerName})));
    }
    if (d.type === 'player_joined') {
      addLog(`${d.name} joined`, 'sys');
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay-msg').textContent = `Room ${roomId} — ${d.players.length} player(s). ${d.players.length < 2 ? 'Need 2 to start.' : 'Ready to start.'}`;
      document.getElementById('start-btn').style.display = isHost ? 'block' : 'none';
      renderPlayers(d.players.map(p => ({...p, isMe: p.name === playerName})));
    }
    if (d.type === 'player_reconnected') {
      addLog(`${d.name} reconnected`, 'sys');
      renderPlayers(d.players.map(p => ({...p, isMe: p.name === playerName})));
    }
    if (d.type === 'player_left') {
      addLog(`${d.name} left`, 'sys');
      isMyTurn = false;
      wordInput.disabled = true;
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay-msg').textContent = `Room ${roomId} — ${d.players.length} player(s). ${d.players.length < 2 ? 'Need 2 to start.' : 'Ready to continue.'}`;
      renderPlayers(d.players.map(p => ({...p, isMe: p.name === playerName})));
    }
    if (d.type === 'waiting') {
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay-msg').textContent = d.message || 'Waiting for players...';
      document.getElementById('start-btn').style.display = (isHost && d.canStart) ? 'block' : 'none';
    }
    if (d.type === 'game_start') {
      document.getElementById('overlay').style.display = 'none';
      addLog('Sequence initiated!', 'sys');
    }
    if (d.type === 'turn') {
      document.getElementById('overlay').style.display = 'none';
      isMyTurn = d.player === playerName;
      setSyllable(d.syllable);
      renderPlayers(d.players.map(p => ({...p, active: p.name === d.player, isMe: p.name === playerName})));
      startTimer(d.timeLeft);
      wordInput.disabled = !isMyTurn;
      wordInput.value = '';
      if (isMyTurn) { wordInput.focus(); wordInput.placeholder = `Type a word with "${d.syllable}"...`; }
      else { wordInput.placeholder = `${d.player}'s turn...`; }
    }
    if (d.type === 'word_result') {
      isMyTurn = false;
      wordInput.disabled = true;
      if (d.valid) {
        addLog(`✓ ${d.player}: ${d.word} (+${d.points})`, 'success');
        if (d.player === playerName) {
          wordInput.classList.add('correct');
          setTimeout(() => wordInput.classList.remove('correct'), 300);
        }
      } else {
        addLog(`✗ ${d.player}: ${d.word || '(timeout)'}`, 'fail');
        wordInput.classList.add('wrong');
        setTimeout(() => wordInput.classList.remove('wrong'), 300);
        document.getElementById('bomb').classList.add('shake');
        setTimeout(() => document.getElementById('bomb').classList.remove('shake'), 300);
      }
      renderPlayers(d.players.map(p => ({...p, isMe: p.name === playerName})));
    }
    if (d.type === 'player_eliminated') {
      addLog(`💥 ${d.player} is eliminated!`, 'fail');
    }
    if (d.type === 'game_over') {
      document.getElementById('overlay').style.display = 'flex';
      document.getElementById('overlay').innerHTML = `
        <h2>◇ Sequence Closed!</h2>
        <div class="room-code">ROOM ${roomId}</div>
        <p style="color:rgba(224,240,255,0.6)">Winner: <strong>${d.winner}</strong></p>
        ${isHost ? `<button class="btn" onclick="beginSequence()">Play Again</button>` : ''}
        <button class="btn" onclick="copyRoomLink()">Copy Room Link</button>
        <a href="/vault" style="color:rgba(224,240,255,0.4);font-size:13px;margin-top:8px">Back to atlas</a>
      `;
    }
  };
  ws.onclose = () => setTimeout(connect, 3000);
}

connect();
</script>
<div class="ledger-panel"><div class="ledger-title">Archive Ledger</div><div id="ledger-list" class="ledger-empty">Waiting for ledger…</div></div>
</body>
</html>
