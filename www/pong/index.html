<!DOCTYPE html>
<html lang="en">
<head>
<script src="/http-socket.js"></script>
<script src="/multiplayer-common.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vault Paddle — Vault Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
html,body { width:100%;height:100%;overflow:hidden;background:#05070f; }
body { display:flex;flex-direction:column;align-items:center;font-family:'Rajdhani',sans-serif;color:#e0f0ff; }
header { width:100%;padding:10px 20px;border-bottom:1px solid rgba(0,200,255,0.2);
  display:flex;align-items:center;gap:14px;flex-shrink:0; }
.back { color:rgba(0,200,255,0.7);text-decoration:none;font-size:12px;letter-spacing:1px;
  text-transform:uppercase;font-family:'Orbitron',monospace; }
header h1 { font-family:'Orbitron',monospace;font-size:18px;color:#00c8ff;letter-spacing:3px; }
.room-info { margin-left:auto;font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,200,255,0.5); }
#vault-wrap { position:relative;flex:1;width:100%;display:flex;justify-content:center;align-items:center; }
canvas { display:block;image-rendering:pixelated; }
.overlay { position:absolute;inset:0;background:rgba(5,7,15,0.93);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  backdrop-filter:blur(6px); }
.overlay h2 { font-family:'Orbitron',monospace;font-size:28px;letter-spacing:4px;color:#00c8ff; }
.overlay p  { color:rgba(224,240,255,0.55);font-size:15px;text-align:center;max-width:340px; }
.overlay .score-big { font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:#fff;letter-spacing:6px; }
.overlay .sub { font-family:'Orbitron',monospace;font-size:12px;color:rgba(0,200,255,0.5);letter-spacing:2px; }
.ready-btn { background:#00c8ff;color:#000;border:none;padding:13px 32px;border-radius:8px;
  font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;
  letter-spacing:2px;text-transform:uppercase;transition:opacity .2s; }
.ready-btn:hover { opacity:.85; }
.ready-btn:disabled { opacity:.4;cursor:default; }
/* Mobile controls */
#mobile-ctrl { position:absolute;bottom:0;left:0;right:0;display:none;
  justify-content:space-between;align-items:flex-end;padding:12px;z-index:10; }
.paddle-ctrl { display:flex;flex-direction:column;gap:8px; }
.paddle-btn { width:64px;height:64px;background:rgba(0,200,255,0.15);
  border:2px solid rgba(0,200,255,0.3);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .1s; }
.paddle-btn:active,.paddle-btn.pressed { background:rgba(0,200,255,0.45); }
@media(max-width:700px),(pointer:coarse) { #mobile-ctrl { display:flex; } }

  .ping-badge{font-family:'Orbitron',monospace;font-size:11px;color:rgba(224,240,255,0.55);border:1px solid rgba(255,255,255,0.12);padding:4px 8px;border-radius:999px;}
  .ping-badge[data-quality="good"]{color:#00ffaa;border-color:rgba(0,255,170,0.28);}
  .ping-badge[data-quality="ok"]{color:#ffcc00;border-color:rgba(255,204,0,0.28);}
  .ping-badge[data-quality="poor"]{color:#ff6677;border-color:rgba(255,102,119,0.28);}

  .ledger-panel{position:fixed;right:10px;bottom:10px;width:220px;max-height:260px;overflow:auto;background:rgba(5,7,15,0.92);border:1px solid rgba(0,255,170,0.15);border-radius:12px;padding:10px;z-index:40;backdrop-filter:blur(4px);} 
  .ledger-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:#00ffaa;margin-bottom:8px;text-transform:uppercase;}
  .ledger-row{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:rgba(224,240,255,0.82);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);} 
  .ledger-row:last-child{border-bottom:none;} .ledger-rank{color:#00ffaa;font-family:'Orbitron',monospace;width:20px;} .ledger-empty{font-size:12px;color:rgba(224,240,255,0.45);} 

</style>
</head>
<body>
<header>
  <a class="back" href="/vault">← Back</a>
  <h1>VAULT PADDLE</h1>
  <div class="room-info" id="room-info"></div>
  <div class="ping-badge" id="ping-badge">Ping -- ms</div>
</header>
<div id="vault-wrap">
  <canvas id="c"></canvas>
  <div id="mobile-ctrl">
    <div class="paddle-ctrl">
      <button class="paddle-btn" id="btn-up">▲</button>
      <button class="paddle-btn" id="btn-down">▼</button>
    </div>
    <div style="font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,200,255,0.4);text-align:center">
      YOUR<br>PADDLE
    </div>
  </div>
  <div class="overlay" id="overlay">
    <div class="sub" id="ov-sub">MULTIPLAYER</div>
    <h2 id="ov-title">VAULT PADDLE</h2>
    <div class="score-big" id="ov-score" style="display:none">0 — 0</div>
    <div class="sub" id="ov-room">ROOM ---</div>
    <p id="ov-msg">Loading...</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="ready-btn" id="ready-btn" style="display:none" onclick="sendReady()">Ready</button><button class="ready-btn" id="copy-btn" type="button" onclick="copyRoomLink()">Copy Room Link</button></div>
  </div>
</div>

<script>
// ─── Params ───────────────────────────────────────────────────────────────────
const LEDGER_GAME = 'Pong';
const { roomId, playerName: myName } = GameVaultMP.normalizeMultiplayerParams({ defaultName: 'Player' });
document.getElementById('room-info').textContent = 'ROOM: ' + roomId;
document.getElementById('ov-room').textContent = 'ROOM ' + roomId;

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 800, H = 400;

function resize() {
  const wrap = document.getElementById('vault-wrap');
  const maxW = Math.min(wrap.clientWidth, 900);
  const maxH = wrap.clientHeight - 80;
  const ratio = W / H;
  let w = maxW, h = maxW / ratio;
  if (h > maxH) { h = maxH; w = maxH * ratio; }
  canvas.width = W; canvas.height = H;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
}
window.addEventListener('resize', resize);
resize();

// ─── State ────────────────────────────────────────────────────────────────────
let mySide = null;
let ball    = { x: W/2, y: H/2 };
let paddles = { left: H/2, right: H/2 };
let scores  = { left: 0, right: 0 };
let sequenceLive = false;
let myPaddleY = H/2;
let keys = {};
const PAD_H = 80, PAD_W = 12, BALL_R = 8, PAD_SPEED = 6;

// ─── WebSocket ────────────────────────────────────────────────────────────────
const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${wsProto}://${location.host}/ws`);
GameVaultMP.bindPingDisplay(ws, 'ping-badge');

ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'join', room: roomId, name: myName, game: 'pong' })); ws.send(JSON.stringify({ type: 'get_stats' }));
};

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'join_error') {
    alert(msg.error || 'Unable to join this room.');
    return;
  }
  handleMsg(msg);
};

ws.onclose = () => {
  showOverlay('DISCONNECTED', 'Connection lost. Please refresh.', false);
};


function renderLedger(scores) {
  scores = (scores || []).filter(s => s && s.game === LEDGER_GAME);
  const el = document.getElementById('ledger-list');
  if (!el) return;
  if (!scores || !scores.length) { el.innerHTML = '<div class="ledger-empty">No ledger entries yet.</div>'; return; }
  el.innerHTML = scores.slice(0,10).map((s,i)=>`<div class="ledger-row"><span class="ledger-rank">${i+1}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span><span>${s.score}</span></div>`).join('');
}
function handleMsg(msg) {
  switch (msg.type) {
    case 'joined':
      mySide = msg.side;
      setOverlay('WAITING', 'Awaiting counterpart...', false);
      break;

    case 'player_joined':
      break;

    case 'pong_waiting':
      setOverlay('READY?', msg.message, true);
      break;

    case 'pong_start':
      scores = msg.scores;
      sequenceLive = true;
      hideOverlay();
      break;

    case 'pong_state':
      ball    = msg.ball;
      paddles = msg.paddles;
      break;

    case 'pong_score':
      scores = msg.scores;
      // Brief flash
      break;

    case 'pong_over':
      sequenceLive = false;
      const won = msg.winner === myName;
      showOverlay(
        won ? '🏆 YOU WIN' : 'YOU LOSE',
        `${msg.scores.left} — ${msg.scores.right}`,
        true,
        won ? '#00ff88' : '#ff4466'
      );
      break;
  }
}

function copyRoomLink() {
  const url = `${location.origin}/vault-paddle/?room=${encodeURIComponent(roomId)}`;
  navigator.clipboard.writeText(url).then(() => {}).catch(() => alert(url));
}

function sendReady() {
  ws.send(JSON.stringify({ type: 'pong_ready' }));
  document.getElementById('ready-btn').disabled = true;
  document.getElementById('ready-btn').textContent = 'Waiting...';
}

// ─── Overlay helpers ─────────────────────────────────────────────────────────
function setOverlay(title, msg, showReady) {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-msg').textContent = msg;
  document.getElementById('ov-score').style.display = 'none';
  const btn = document.getElementById('ready-btn');
  btn.style.display = showReady ? 'block' : 'none';
  btn.disabled = false;
  btn.textContent = 'Ready';
}

function showOverlay(title, scoreText, showBtn, color='#00c8ff') {
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-title').style.color = color;
  document.getElementById('ov-score').style.display = 'block';
  document.getElementById('ov-score').textContent = scoreText;
  document.getElementById('ov-msg').textContent = '';
  const btn = document.getElementById('ready-btn');
  btn.style.display = showBtn ? 'block' : 'none';
  btn.textContent = 'Play Again';
  btn.disabled = false;
  btn.onclick = () => sendReady();
}

function hideOverlay() {
  document.getElementById('overlay').style.display = 'none';
}

// ─── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','KeyW','KeyS','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

function bindBtn(id, code) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[code] = true; btn.classList.add('pressed'); }, {passive:false});
  btn.addEventListener('touchend',   e => { e.preventDefault(); keys[code] = false; btn.classList.remove('pressed'); }, {passive:false});
  btn.addEventListener('mousedown',  () => { keys[code] = true;  btn.classList.add('pressed'); });
  btn.addEventListener('mouseup',    () => { keys[code] = false; btn.classList.remove('pressed'); });
}
bindBtn('btn-up',   'ArrowUp');
bindBtn('btn-down', 'ArrowDown');

// ─── Sequence loop ────────────────────────────────────────────────────────────
let lastSent = 0;
function loop() {
  requestAnimationFrame(loop);
  if (!sequenceLive) return;

  // Move my paddle
  const up   = keys['ArrowUp']   || keys['KeyW'];
  const down = keys['ArrowDown'] || keys['KeyS'];
  if (up)   myPaddleY = Math.max(PAD_H/2, myPaddleY - PAD_SPEED);
  if (down) myPaddleY = Math.min(H - PAD_H/2, myPaddleY + PAD_SPEED);

  // Update local prediction
  if (mySide) paddles[mySide] = myPaddleY;

  // Send to server throttled to 30/s
  const now = Date.now();
  if ((up || down) && now - lastSent > 33) {
    ws.send(JSON.stringify({ type: 'pong_paddle', y: myPaddleY }));
    lastSent = now;
  }

  draw();
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#05070f';
  ctx.fillRect(0, 0, W, H);

  // Centre line
  ctx.setLineDash([12, 10]);
  ctx.strokeStyle = 'rgba(0,200,255,0.12)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // Scores
  ctx.font = 'bold 48px Orbitron, monospace';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,200,255,0.18)';
  ctx.fillText(scores.left,  W/2 - 100, 70);
  ctx.fillText(scores.right, W/2 + 100, 70);

  // Player labels
  ctx.font = '11px Orbitron, monospace';
  ctx.fillStyle = mySide === 'left'
    ? 'rgba(0,255,150,0.6)'
    : 'rgba(0,200,255,0.35)';
  ctx.fillText(mySide === 'left' ? '◀ YOU' : '◀', W/4, H - 12);
  ctx.fillStyle = mySide === 'right'
    ? 'rgba(0,255,150,0.6)'
    : 'rgba(0,200,255,0.35)';
  ctx.fillText(mySide === 'right' ? 'YOU ▶' : '▶', W * 3/4, H - 12);

  // Paddles
  drawPaddle(40, paddles.left,  mySide === 'left');
  drawPaddle(W - 40 - PAD_W, paddles.right, mySide === 'right');

  // Ball
  ctx.shadowColor = '#00c8ff';
  ctx.shadowBlur  = 14;
  ctx.fillStyle   = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawPaddle(x, cy, isMe) {
  const y = cy - PAD_H/2;
  ctx.shadowColor = isMe ? '#00ff88' : '#00c8ff';
  ctx.shadowBlur  = 12;
  const g = ctx.createLinearGradient(x, y, x + PAD_W, y + PAD_H);
  g.addColorStop(0, isMe ? '#00ff88' : '#00c8ff');
  g.addColorStop(1, isMe ? '#009944' : '#006688');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.roundRect(x, y, PAD_W, PAD_H, 4);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ─── Start ────────────────────────────────────────────────────────────────────
setOverlay('VAULT PADDLE', 'Linking...', false);
requestAnimationFrame(loop);
</script>
<div class="ledger-panel"><div class="ledger-title">Archive Ledger</div><div id="ledger-list" class="ledger-empty">Waiting for ledger…</div></div>
</body>
</html>
