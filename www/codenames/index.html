<!doctype html><html><head><script src="/http-socket.js"></script><script src="/multiplayer-common.js"></script><meta charset="utf-8"><title>Vault Codenames</title><style>body{background:#05070f;color:#e0f0ff;font-family:Rajdhani,sans-serif;padding:20px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.card{padding:12px;border:1px solid #2a3557;border-radius:8px;cursor:pointer}.card.revealed{opacity:.55}.btn{background:#00aaff;border:0;padding:8px 12px;border-radius:8px}</style></head><body><a href="/vault">← Back</a><h2>Vault Codenames</h2><div id="state">-</div><button class="btn" id="start">Start</button><input id="clue" placeholder="clue"><input id="count" type="number" value="1" min="1" style="width:60px"><button class="btn" id="send">Send clue</button><button class="btn" id="end">End turn</button><div class="grid" id="g"></div>
<script>
const {roomId,playerName}=GameVaultMP.normalizeMultiplayerParams({defaultName:'Player'});let ws;
function render(m){document.getElementById('state').textContent=`Turn ${m.turn} / ${m.phase} ${m.winner?('Winner '+m.winner):''}`;const g=document.getElementById('g');g.innerHTML='';m.board.forEach((c,i)=>{const d=document.createElement('div');d.className='card'+(c.revealed?' revealed':'');d.textContent=c.word+(c.role?` (${c.role})`:'' );d.onclick=()=>ws.send(JSON.stringify({type:'codenames_guess',index:i}));g.appendChild(d);});}
ws=GameVaultMP.createSocket();ws.onopen=()=>ws.send(JSON.stringify({type:'join',game:'codenames',room:roomId,name:playerName}));ws.onmessage=e=>{const m=JSON.parse(e.data);if(m.type==='codenames_state')render(m);};
document.getElementById('start').onclick=()=>ws.send(JSON.stringify({type:'start_game'}));document.getElementById('send').onclick=()=>ws.send(JSON.stringify({type:'codenames_clue',word:clue.value,count:Number(count.value||1)}));document.getElementById('end').onclick=()=>ws.send(JSON.stringify({type:'codenames_end_turn'}));
</script></body></html>
