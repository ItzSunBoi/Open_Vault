<!DOCTYPE html>
<html lang="en">
<head>
<script src="/http-socket.js"></script>
<script src="/multiplayer-common.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vault Fleet — Vault Atlas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#05070f;color:#e0f0ff;font-family:'Rajdhani',sans-serif;
  display:flex;flex-direction:column;align-items:center;min-height:100vh; }
header { width:100%;padding:10px 20px;border-bottom:1px solid rgba(0,180,255,0.2);
  display:flex;align-items:center;gap:14px;flex-shrink:0; }
.back { color:rgba(0,180,255,0.7);text-decoration:none;font-size:12px;letter-spacing:1px;
  text-transform:uppercase;font-family:'Orbitron',monospace; }
h1 { font-family:'Orbitron',monospace;font-size:18px;color:#00b4ff;letter-spacing:3px; }
.room-tag { margin-left:auto;font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,180,255,0.4); }
main { display:flex;flex-direction:column;align-items:center;padding:12px;gap:12px;width:100%;max-width:700px; }
.status-bar { font-family:'Orbitron',monospace;font-size:13px;color:#00b4ff;letter-spacing:1px;
  text-align:center;padding:8px 16px;background:rgba(0,180,255,0.06);border-radius:8px;width:100%; }
.boards { display:flex;gap:16px;justify-content:center;flex-wrap:wrap; }
.board-section { display:flex;flex-direction:column;align-items:center;gap:6px; }
.board-label { font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;
  color:rgba(0,180,255,0.5);text-transform:uppercase; }
.grid { display:grid;grid-template-columns:repeat(10,1fr);gap:2px;cursor:pointer; }
.grid.no-click { cursor:default; opacity:0.96; }
.grid.placing-grid { box-shadow:0 0 0 1px rgba(0,180,255,0.22), 0 0 18px rgba(0,180,255,0.12); }
.cell { width:28px;height:28px;border-radius:3px;background:#0a1520;
  border:1px solid rgba(0,180,255,0.12);transition:all .12s;display:flex;align-items:center;justify-content:center;font-size:13px; }
.cell.ship   { background:#0d2a3a;border-color:rgba(0,180,255,0.35); }
.cell.hit    { background:#3a0808;border-color:#ff4444; }
.cell.miss   { background:#0a1a28;border-color:rgba(0,180,255,0.2); }
.cell.sunk   { background:#1a0000;border-color:#ff2222; }
.cell.hover:not(.hit):not(.miss) { background:#0d2030;border-color:rgba(0,180,255,0.6); }
.cell.placing { background:#0d2a3a;border-color:#00b4ff; }
.ships-bar { display:flex;gap:8px;flex-wrap:wrap;justify-content:center; }
.ship-btn { padding:6px 12px;background:rgba(0,180,255,0.08);border:1px solid rgba(0,180,255,0.25);
  border-radius:6px;font-family:'Orbitron',monospace;font-size:10px;color:rgba(0,180,255,0.7);
  cursor:pointer;transition:all .15s;letter-spacing:1px; }
.ship-btn:hover { background:rgba(0,180,255,0.18);border-color:#00b4ff;color:#00b4ff; }
.ship-btn.placed { opacity:.35;cursor:default;text-decoration:line-through; }
.ship-btn.selected { background:rgba(0,180,255,0.25);border-color:#00b4ff;color:#fff; }
.btn-row { display:flex;gap:10px;flex-wrap:wrap;justify-content:center; }
.btn { padding:10px 22px;border:none;border-radius:8px;font-family:'Orbitron',monospace;
  font-size:12px;font-weight:700;cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s; }
.btn-primary { background:#00b4ff;color:#000; }
.btn-secondary { background:transparent;border:1px solid rgba(0,180,255,0.4);color:rgba(0,180,255,0.8); }
.btn:hover { opacity:.82; }
.btn:disabled { opacity:.35;cursor:default; }
.overlay { position:fixed;inset:0;background:rgba(5,7,15,0.93);display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;backdrop-filter:blur(6px); }
.overlay.show { display:flex; }
.overlay h2 { font-family:'Orbitron',monospace;font-size:30px;letter-spacing:4px;color:#00b4ff; }
.overlay p  { color:rgba(224,240,255,0.55);font-size:15px;text-align:center;max-width:340px; }
@media(max-width:480px) { .cell{width:22px;height:22px;font-size:10px;} }

  .ping-badge{font-family:'Orbitron',monospace;font-size:11px;color:rgba(224,240,255,0.55);border:1px solid rgba(255,255,255,0.12);padding:4px 8px;border-radius:999px;}
  .ping-badge[data-quality="good"]{color:#00ffaa;border-color:rgba(0,255,170,0.28);}
  .ping-badge[data-quality="ok"]{color:#ffcc00;border-color:rgba(255,204,0,0.28);}
  .ping-badge[data-quality="poor"]{color:#ff6677;border-color:rgba(255,102,119,0.28);}

  .ledger-panel{position:fixed;right:10px;bottom:10px;width:220px;max-height:260px;overflow:auto;background:rgba(5,7,15,0.92);border:1px solid rgba(0,255,170,0.15);border-radius:12px;padding:10px;z-index:40;backdrop-filter:blur(4px);} 
  .ledger-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:#00ffaa;margin-bottom:8px;text-transform:uppercase;}
  .ledger-row{display:flex;justify-content:space-between;gap:8px;font-size:12px;color:rgba(224,240,255,0.82);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.05);} 
  .ledger-row:last-child{border-bottom:none;} .ledger-rank{color:#00ffaa;font-family:'Orbitron',monospace;width:20px;} .ledger-empty{font-size:12px;color:rgba(224,240,255,0.45);} 

</style>
</head>
<body>
<header>
  <a class="back" href="/vault">← Back</a>
  <h1>VAULT FLEET</h1>
  <div class="room-tag" id="room-tag"></div>
  <div class="ping-badge" id="ping-badge">Ping -- ms</div>
</header>
<main>
  <div class="status-bar" id="status">Connecting...</div>
  <div class="ships-bar" id="ships-bar"></div>
  <div class="btn-row" id="btn-row"></div>
  <div class="boards">
    <div class="board-section">
      <div class="board-label">Your Fleet</div>
      <div class="grid no-click" id="my-grid"></div>
    </div>
    <div class="board-section">
      <div class="board-label">Enemy Waters</div>
      <div class="grid" id="enemy-grid"></div>
    </div>
  </div>
</main>
<div class="overlay" id="overlay">
  <h2 id="ov-title">VAULT FLEET</h2>
  <div style="font-family:'Orbitron',monospace;font-size:20px;color:#00ffaa;letter-spacing:4px;padding:10px 14px;border:1px solid rgba(0,255,170,0.25);border-radius:10px;background:rgba(0,255,170,0.06)">ROOM <span id="overlay-room-code">---</span></div>
  <p id="ov-msg"></p>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center"><button class="btn btn-primary" onclick="location.reload()">Play Again</button><button class="btn btn-secondary" type="button" onclick="copyRoomLink()">Copy Room Link</button></div>
</div>

<script>
const LEDGER_GAME = 'Battleship';
const { roomId, playerName: myName } = GameVaultMP.normalizeMultiplayerParams({ defaultName: 'Admiral' });
document.getElementById('room-tag').textContent = 'ROOM: ' + roomId;
document.getElementById('overlay-room-code').textContent = roomId;

function copyRoomLink() {
  const url = `${location.origin}/vault-fleet/?room=${encodeURIComponent(roomId)}`;
  navigator.clipboard.writeText(url).then(() => {}).catch(() => alert(url));
}

const SHIPS = [
  {name:'Carrier',    size:5},
  {name:'Vault Fleet', size:4},
  {name:'Cruiser',    size:3},
  {name:'Submarine',  size:3},
  {name:'Destroyer',  size:2},
];
const COLS = 10, ROWS = 10;

let myGrid    = Array.from({length:ROWS}, ()=>Array(COLS).fill(0)); // 0=empty,1=ship,2=hit,3=miss
let enemyGrid = Array.from({length:ROWS}, ()=>Array(COLS).fill(0)); // 0=unknown,2=hit,3=miss
let placedShips = [];
let selectedShip = null;
let horizontal = true;
let myTurn = false;
let phase = 'waiting'; // waiting | placing | battle | done
let hoveredCells = [];
let lastHoverKey = '';
let pendingShot = false;

// ── WS ────────────────────────────────────────────────────────────────────────
const wsProto = location.protocol==='https:'?'wss':'ws';
const ws = new WebSocket(`${wsProto}://${location.host}/ws`);
GameVaultMP.bindPingDisplay(ws, 'ping-badge');
ws.onopen = () => ws.send(JSON.stringify({type:'join',room:roomId,name:myName,game:'battleship'})); ws.send(JSON.stringify({type:'get_stats'}));
ws.onmessage = e => { const d = JSON.parse(e.data); if (d.type === 'join_error') { alert(d.error || 'Unable to join this room.'); return; } handleMsg(d); };
ws.onclose   = () => setStatus('Disconnected. Please refresh.');

function send(obj) { if(ws.readyState===1) ws.send(JSON.stringify(obj)); }


function renderLedger(scores) {
  scores = (scores || []).filter(s => s && s.game === LEDGER_GAME);
  const el = document.getElementById('ledger-list');
  if (!el) return;
  if (!scores || !scores.length) { el.innerHTML = '<div class="ledger-empty">No ledger entries yet.</div>'; return; }
  el.innerHTML = scores.slice(0,10).map((s,i)=>`<div class="ledger-row"><span class="ledger-rank">${i+1}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name}</span><span>${s.score}</span></div>`).join('');
}
function handleMsg(msg) {
  switch(msg.type) {
    case 'leaderboard':
      renderLedger(msg.scores);
      break;
    case 'joined':
      setStatus(msg.isHost ? 'Waiting for opponent to join this room...' : 'Joined room. Waiting for host...');
      break;
    case 'bs_start_placing':
      phase = 'placing';
      selectedShip = SHIPS.find(s => !placedShips.some(p => p.name === s.name)) || null;
      setStatus('Place your ships! Tap a ship, then tap your grid. Press R to rotate on desktop.');
      renderShipsBar();
      renderButtons();
      renderMyGrid();
      break;
    case 'bs_wait_opponent':
      setStatus('Waiting for opponent to finish placing...');
      renderButtons([]);
      break;
    case 'bs_battle_start':
      phase = 'battle';
      myTurn = msg.yourTurn;
      setStatus(myTurn ? 'YOUR TURN — Fire!' : "Opponent's turn...");
      renderButtons([]);
      renderEnemyGrid();
      break;
    case 'bs_sync':
      phase = msg.phase || 'battle';
      myTurn = !!msg.yourTurn;
      if (Array.isArray(msg.selfGrid) && msg.selfGrid.length) myGrid = msg.selfGrid;
      enemyGrid = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));
      (msg.shots || []).forEach(s => { if (s && s.row >= 0 && s.col >= 0) enemyGrid[s.row][s.col] = s.state; });
      renderMyGrid();
      renderEnemyGrid();
      setStatus(myTurn ? 'YOUR TURN — Fire!' : "Opponent's turn...");
      break;
    case 'bs_result':
      pendingShot = false;
      enemyGrid[msg.row][msg.col] = msg.hit ? 2 : 3;
      if (msg.sunk) markSunk(enemyGrid, msg.sunkCells, true);
      myTurn = !!msg.yourTurn;
      renderEnemyGrid();
      renderMyGrid();
      setStatus(msg.hit
        ? (msg.sunk ? '💥 SUNK! Hit again.' : 'HIT! Fire again.')
        : 'Miss! Opponent\'s turn...');
      break;
    case 'bs_incoming':
      pendingShot = false;
      myGrid[msg.row][msg.col] = msg.hit ? 2 : 3;
      if (msg.sunk) markSunk(myGrid, msg.sunkCells, false);
      myTurn = !!msg.yourTurn;
      renderMyGrid();
      renderEnemyGrid();
      setStatus(msg.hit
        ? (msg.sunk ? 'Your ship was SUNK! Opponent fires again.' : 'Your ship was HIT! Opponent fires again.')
        : 'They missed! Your turn — Fire!');
      break;
    case 'bs_over':
      phase = 'done';
      const won = msg.winner === myName;
      document.getElementById('ov-title').textContent = won ? '🏆 VICTORY' : '💀 DEFEATED';
      document.getElementById('ov-title').style.color = won ? '#00ff88' : '#ff4444';
      document.getElementById('ov-msg').textContent = won ? 'You sunk the entire fleet!' : 'Your fleet was destroyed.';
      document.getElementById('overlay').classList.add('show');
      break;
    case 'player_left':
      setStatus('Opponent disconnected.');
      break;
  }
}

function markSunk(grid, cells, isEnemy) {
  if (!cells) return;
  cells.forEach(([r,c]) => { grid[r][c] = 4; }); // 4 = sunk
}

// ── Placing ───────────────────────────────────────────────────────────────────
function renderShipsBar() {
  const bar = document.getElementById('ships-bar');
  bar.innerHTML = '';
  const firstAvailable = SHIPS.find(s => !placedShips.some(p => p.name === s.name));
  if (!selectedShip && firstAvailable && phase === 'placing') selectedShip = firstAvailable;
  SHIPS.forEach((s,i) => {
    const placed = placedShips.some(p=>p.name===s.name);
    const btn = document.createElement('button');
    btn.className = 'ship-btn' + (placed?' placed':'') + (selectedShip&&selectedShip.name===s.name?' selected':'');
    btn.textContent = s.name + ' (' + s.size + ')';
    btn.onclick = () => {
      if(!placed){
        selectedShip = s;
        setStatus(`Placing ${s.name} (${s.size}). ${horizontal ? 'Horizontal' : 'Vertical'} orientation.`);
        renderShipsBar();
        renderMyGrid();
      }
    };
    bar.appendChild(btn);
  });
}

function renderButtons(btns) {
  const row = document.getElementById('btn-row');
  row.innerHTML = '';
  if (phase==='placing' && btns===undefined) {
    const rotBtn = document.createElement('button');
    rotBtn.className='btn btn-secondary';
    rotBtn.textContent = horizontal ? 'Horizontal ↔' : 'Vertical ↕';
    rotBtn.onclick = () => { horizontal=!horizontal; renderButtons(); renderMyGrid(); };
    row.appendChild(rotBtn);

    const allPlaced = SHIPS.every(s=>placedShips.some(p=>p.name===s.name));
    const readyBtn = document.createElement('button');
    readyBtn.className='btn btn-primary';
    readyBtn.textContent='Ready!';
    readyBtn.disabled=!allPlaced;
    readyBtn.onclick=confirmPlacement;
    row.appendChild(readyBtn);

    const resetBtn = document.createElement('button');
    resetBtn.className='btn btn-secondary';
    resetBtn.textContent='Reset';
    resetBtn.onclick=resetPlacement;
    row.appendChild(resetBtn);
  }
}

function resetPlacement() {
  myGrid = Array.from({length:ROWS},()=>Array(COLS).fill(0));
  placedShips = [];
  selectedShip = null;
  hoveredCells = [];
  lastHoverKey = '';
  renderShipsBar();
  renderButtons();
  renderMyGrid();
}

function confirmPlacement() {
  send({type:'bs_place', ships: placedShips});
  phase='placed';
  setStatus('Waiting for opponent to finish placing...');
  renderButtons([]);
}

function getHoverCells(row,col) {
  if(!selectedShip||phase!=='placing') return [];
  const cells=[];
  for(let i=0;i<selectedShip.size;i++){
    const r = horizontal?row:row+i;
    const c = horizontal?col+i:col;
    if(r<0||r>=ROWS||c<0||c>=COLS) return null;
    cells.push([r,c]);
  }
  return cells;
}

function setHoverCells(cells) {
  const normalized = cells || [];
  const key = normalized.map(([r,c]) => `${r},${c}`).join('|');
  if (key === lastHoverKey) return;
  hoveredCells = normalized;
  lastHoverKey = key;
  renderMyGrid();
}

function placeShip(row,col) {
  if(!selectedShip||phase!=='placing') return;
  if(placedShips.some(p=>p.name===selectedShip.name)) return;
  const cells = getHoverCells(row,col);
  if(!cells) {
    setStatus('That ship does not fit there. Try another square or rotate it.');
    return;
  }
  for(const [r,c] of cells) {
    if(myGrid[r][c]===1) {
      setStatus('Ships cannot overlap. Pick another position.');
      return;
    }
  }
  cells.forEach(([r,c])=>myGrid[r][c]=1);
  placedShips.push({name:selectedShip.name,size:selectedShip.size,cells});
  const placedName = selectedShip.name;
  selectedShip=null;
  hoveredCells=[];
  lastHoverKey='';
  renderShipsBar();
  renderButtons();
  renderMyGrid();
  const remaining = SHIPS.filter(s => !placedShips.some(p => p.name === s.name)).length;
  setStatus(remaining ? `${placedName} placed. Select the next ship.` : 'All ships placed. Hit Ready!');
}

// ── Grids ─────────────────────────────────────────────────────────────────────
function renderMyGrid() {
  const grid = document.getElementById('my-grid');
  grid.className='grid' + (phase==='placing' ? ' placing-grid' : ' no-click');

  const needsRebuild = grid.children.length !== ROWS * COLS;
  if (needsRebuild) {
    grid.innerHTML='';
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) {
      const cell=document.createElement('div');
      cell.className='cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      grid.appendChild(cell);
    }
  }

  const cells=[...grid.querySelectorAll('.cell')];
  cells.forEach((cell,idx)=>{
    const r = Number(cell.dataset.row ?? Math.floor(idx / COLS));
    const c = Number(cell.dataset.col ?? idx % COLS);
    cell.className = 'cell';
    cell.textContent = '';
    const v=myGrid[r][c];
    if(v===1) { cell.classList.add('ship'); }
    else if(v===2) { cell.classList.add('hit'); cell.textContent='💥'; }
    else if(v===3) { cell.classList.add('miss'); cell.textContent='•'; }
    else if(v===4) { cell.classList.add('sunk'); cell.textContent='☠'; }
    if(phase==='placing'&&selectedShip) {
      const inHover = hoveredCells.some(([hr,hc])=>hr===r&&hc===c);
      if(inHover) cell.classList.add('placing');
    }

    if (phase==='placing' && !cell.dataset.boundPlacement) {
      cell.dataset.boundPlacement = '1';
      cell.addEventListener('mouseenter',()=>setHoverCells(getHoverCells(r,c)||[]));
      cell.addEventListener('mouseleave',()=>setHoverCells([]));
      cell.addEventListener('click',()=>placeShip(r,c));
      cell.addEventListener('touchstart',(e)=>{ e.preventDefault(); hoveredCells = getHoverCells(r,c) || []; }, {passive:false});
      cell.addEventListener('touchend',(e)=>{ e.preventDefault(); placeShip(r,c); }, {passive:false});
      cell.addEventListener('pointerup',(e)=>{ if(e.pointerType !== 'mouse') placeShip(r,c); });
    }
  });
}

function renderEnemyGrid() {
  const grid=document.getElementById('enemy-grid');
  grid.innerHTML='';
  grid.className='grid'+(phase==='battle'&&myTurn?'':' no-click');
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    const v=enemyGrid[r][c];
    if(v===2) { cell.classList.add('hit'); cell.textContent='💥'; }
    else if(v===3) { cell.classList.add('miss'); cell.textContent='•'; }
    else if(v===4) { cell.classList.add('sunk'); cell.textContent='☠'; }
    else if(phase==='battle'&&myTurn) {
      cell.addEventListener('mouseenter',()=>cell.classList.add('hover'));
      cell.addEventListener('mouseleave',()=>cell.classList.remove('hover'));
      cell.addEventListener('click',()=>fireAt(r,c));
      cell.addEventListener('touchstart',(e)=>{ e.preventDefault(); cell.classList.add('hover'); }, {passive:false});
      cell.addEventListener('touchend',(e)=>{ e.preventDefault(); fireAt(r,c); }, {passive:false});
      cell.addEventListener('pointerup',(e)=>{ if(e.pointerType !== 'mouse') fireAt(r,c); });
    }
    grid.appendChild(cell);
  }
}

function fireAt(r,c) {
  if(!myTurn||enemyGrid[r][c]!==0||phase!=='battle'||pendingShot) return;
  pendingShot = true;
  myTurn=false;
  setStatus('Firing...');
  renderEnemyGrid();
  send({type:'bs_fire',row:r,col:c});
}

function setStatus(txt) {
  document.getElementById('status').textContent=txt;
}

// keyboard rotate
document.addEventListener('keydown',e=>{ if(e.key==='r'||e.key==='R'){horizontal=!horizontal;setStatus(`Orientation: ${horizontal ? 'Horizontal' : 'Vertical'}`);renderButtons();renderMyGrid();} });

renderMyGrid();
renderEnemyGrid();
</script>
<div class="ledger-panel"><div class="ledger-title">Archive Ledger</div><div id="ledger-list" class="ledger-empty">Waiting for ledger…</div></div>
</body>
</html>
